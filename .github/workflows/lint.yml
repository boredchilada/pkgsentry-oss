name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff==0.6.9 black==24.8.0

      - name: ruff
        run: ruff check pkgsentry/ tests/

      - name: black
        run: black --check pkgsentry/ tests/
