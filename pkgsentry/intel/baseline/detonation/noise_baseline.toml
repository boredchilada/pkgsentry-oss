# Per-ecosystem noise filters for the detonation Go sandbox service.
# Trace events matching these patterns are dropped before behavioral rules
# evaluate them — they're the expected, normal behavior of pip/npm/cargo
# themselves. UNION semantics on each list.

# PyPI: pip's own writes / cache reads / vendored module loads.
pypi_file_noise = [
    "/site-packages/",
    "/.cache/pip/",
    "/tmp/pip-",
    "/__pycache__/",
    "/pip/_vendor/",
    ".dist-info/",
    ".egg-info/",
]

# PyPI: exec of the interpreter itself / pip binary.
pypi_exec_noise = [
    "/python",
    "/pip",
]

# npm: cache / lockfile / node_modules churn + npm's own .npmrc reads.
npm_file_noise = [
    "/.npm/_cacache/",
    "/.npm/_logs/",
    "/node_modules/",
    "/tmp/npm-",
    "/.npmrc",
]

# npm: exec of node / npm.
npm_exec_noise = [
    "/node",
    "/npm",
]

# crates.io: cargo's own work paths.
crates_file_noise = [
    "/.cargo/registry/",
    "/.cargo/bin/",
    "/.rustup/",
    "/target/",
]

# crates.io: exec of rust toolchain.
crates_exec_noise = [
    "/rustc",
    "/cargo",
    "/rustup",
]

# Per-ecosystem network destination allowlist (hostnames resolved to IPs at
# detonation time, or literal IPs). Connections to these expected registry /
# CDN endpoints are dropped before the network exfil rules run, so normal
# dependency fetches don't false-positive as dyn_install_exfil/dyn_import_exfil.
pypi_net_allow = [
    "pypi.org",
    "files.pythonhosted.org",
]

npm_net_allow = [
    "registry.npmjs.org",
    "registry.yarnpkg.com",
]

crates_net_allow = [
    "crates.io",
    "static.crates.io",
    "index.crates.io",
]

gomod_net_allow = [
    "proxy.golang.org",
    "sum.golang.org",
    "storage.googleapis.com",
]
