apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: detonation-monitor
spec:
  kprobes:
    # Outbound connections (feeds dyn_import_exfil; dyn_install_exfil deferred).
    - call: "tcp_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
      selectors:
        - matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values: ["4026531836"]

    # File opens. Block 1: credential reads on sensitive paths (host + container
    # — these paths are rarely touched on the host). Block 2: any /proc/<pid>/
    # environ read, container-scoped to avoid host /proc noise.
    - call: "__x64_sys_openat"
      syscall: true
      args:
        - index: 1
          type: "string"
      selectors:
        - matchArgs:
            - index: 1
              operator: "Prefix"
              values:
                - "/root/.ssh"
                - "/root/.aws"
                - "/root/.gnupg"
                - "/root/.npmrc"
                - "/root/.cargo/credentials"
                - "/root/.docker/config.json"
                - "/root/.kube"
                - "/etc/shadow"
                - "/etc/passwd"
        - matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values: ["4026531836"]
          matchArgs:
            - index: 1
              operator: "Postfix"
              values:
                - "/environ"

    # Persistence writes (feeds dyn_suspicious_write). security_file_permission
    # arg1 mask: MAY_WRITE = 2. Container-scoped.
    - call: "security_file_permission"
      syscall: false
      args:
        - index: 0
          type: "file"
        - index: 1
          type: "int"
      selectors:
        - matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values: ["4026531836"]
          matchArgs:
            - index: 0
              operator: "Prefix"
              values:
                - "/etc/cron"
                - "/etc/systemd/"
                - "/root/.bashrc"
                - "/root/.profile"
                - "/root/.bash_profile"
                - "/root/.ssh/authorized_keys"
            - index: 1
              operator: "Equal"
              values: ["2"]

    # ptrace-based injection (feeds dyn_proc_inject). Tightened to attach/poke
    # requests; PTRACE_TRACEME (0) from ordinary debuggers is excluded.
    # 4=POKETEXT 5=POKEDATA 16=ATTACH 16902=SEIZE
    - call: "sys_ptrace"
      syscall: true
      args:
        - index: 0
          type: "int"
      selectors:
        - matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values: ["4026531836"]
          matchArgs:
            - index: 0
              operator: "Equal"
              values: ["4", "5", "16", "16902"]

    # cross-process memory write injection (feeds dyn_proc_inject). No bare
    # kernel symbol, so hook the syscall form. Container-scoped.
    - call: "__x64_sys_process_vm_writev"
      syscall: true
      args:
        - index: 0
          type: "int"
      selectors:
        - matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values: ["4026531836"]

    # Fileless execution (feeds dyn_fileless_exec). Container-scoped.
    - call: "__x64_sys_memfd_create"
      syscall: true
      args:
        - index: 0
          type: "string"
        - index: 1
          type: "uint32"
      selectors:
        - matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values: ["4026531836"]

    - call: "__x64_sys_execveat"
      syscall: true
      args:
        - index: 0
          type: "int"
        - index: 1
          type: "string"
        - index: 4
          type: "int"
      selectors:
        - matchNamespaces:
            - namespace: Pid
              operator: NotIn
              values: ["4026531836"]
          matchArgs:
            - index: 4
              operator: "Equal"
              values: ["4096"]  # AT_EMPTY_PATH — execve from an fd
