# Embedded baseline for the detonation Go service.
# Mirror of pkgsentry/intel/baseline/detonation/rules_data.toml.
# Overlay via $PKGSENTRY_INTEL_PATH/detonation/rules_data.toml — UNION semantics.

sensitive_path_prefixes = [
    "/root/.ssh/",
    "/home/",
    "/.ssh/",
    "/root/.aws/",
    "/.aws/",
    "/root/.gnupg/",
    "/.gnupg/",
    "/root/.npmrc",
    "/.npmrc",
    "/root/.cargo/credentials",
    "/.cargo/credentials",
    "/root/.docker/config.json",
    "/.docker/config.json",
    "/root/.kube/config",
    "/.kube/config",
    "/etc/shadow",
]

sensitive_env_prefixes = [
    "AWS_SECRET",
    "AWS_ACCESS_KEY",
    "GITHUB_TOKEN",
    "GH_TOKEN",
    "NPM_TOKEN",
    "CARGO_REGISTRY_TOKEN",
    "OPENAI_API_KEY",
    "ANTHROPIC_API_KEY",
    "DATABASE_URL",
    "DB_PASSWORD",
    "DISCORD_TOKEN",
    "SLACK_TOKEN",
]

shell_binaries = [
    "/bin/sh",
    "/bin/bash",
    "/bin/zsh",
    "/bin/dash",
    "/usr/bin/sh",
    "/usr/bin/bash",
]
