# Embedded baseline for the detonation Go service.
# Mirror of pkgsentry/intel/baseline/detonation/noise_baseline.toml.
# Overlay via $PKGSENTRY_INTEL_PATH/detonation/noise_baseline.toml — UNION semantics.

pypi_file_noise = [
    "/site-packages/",
    "/.cache/pip/",
    "/tmp/pip-",
    "/__pycache__/",
    "/pip/_vendor/",
    ".dist-info/",
    ".egg-info/",
]

pypi_exec_noise = [
    "/python",
    "/pip",
]

npm_file_noise = [
    "/.npm/_cacache/",
    "/.npm/_logs/",
    "/node_modules/",
    "/tmp/npm-",
    "/.npmrc",
]

npm_exec_noise = [
    "/node",
    "/npm",
]

crates_file_noise = [
    "/.cargo/registry/",
    "/.cargo/bin/",
    "/.rustup/",
    "/target/",
]

crates_exec_noise = [
    "/rustc",
    "/cargo",
    "/rustup",
]

gomod_file_noise = [
    "/go/pkg/mod/",
    "/go/pkg/",
    "/root/.cache/go-build/",
    "/.cache/go-build/",
    "/usr/local/go/",
]

gomod_exec_noise = [
    "/go",
    "/compile",
    "/link",
    "/asm",
    "/vet",
    "/gofmt",
    "/unzip",
    "/tar",
]

# Per-ecosystem network destination allowlist (hostnames resolved to IPs at
# detonation time, or literal IPs). Connections to these expected registry /
# CDN endpoints are dropped before the network exfil rules run, so normal
# dependency fetches don't false-positive as dyn_install_exfil/dyn_import_exfil.
pypi_net_allow = [
    "pypi.org",
    "files.pythonhosted.org",
]

npm_net_allow = [
    "registry.npmjs.org",
    "registry.yarnpkg.com",
]

crates_net_allow = [
    "crates.io",
    "static.crates.io",
    "index.crates.io",
]

gomod_net_allow = [
    "proxy.golang.org",
    "sum.golang.org",
    "storage.googleapis.com",
]
